<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dynasty 8 - Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .gta-card { background: #0f1012; border: 1px solid #1c1e22; border-radius: 10px; }
        .input-gta { background: #16181b; border: 1px solid #282c31; color: white; padding: 12px; border-radius: 6px; width: 100%; margin-bottom: 10px; text-align: center; }
        .btn-blue { background: #2454d1; width: 100%; padding: 15px; border-radius: 6px; font-weight: bold; uppercase; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="loginPage" class="gta-card p-10 w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold italic text-white">DYNASTY <span class="text-blue-600">8</span></h2>
        </div>
        <input type="text" id="idInput" class="input-gta" placeholder="IDENTIFIANT">
        <input type="password" id="passInput" class="input-gta" placeholder="MOT DE PASSE">
        <button onclick="login()" class="btn-blue">SE CONNECTER</button>
    </div>

    <div id="mainSite" class="hidden text-center">
        <h1 class="text-3xl font-bold">BIENVENUE <span id="userName" class="text-blue-500"></span></h1>
        <p class="mt-4 text-gray-400">Grade : <span id="userGrade"></span></p>
        <button onclick="location.reload()" class="mt-10 text-red-500 text-xs">DÉCONNEXION</button>
    </div>

    <script>
        function login() {
            const user = document.getElementById('idInput').value;
            const pass = document.getElementById('passInput').value;

            // Comptes autorisés
            const accounts = {
                "owner": { mdp: "admin123", nom: "Direction", grade: "Patron" },
                "Mariano Ramirez": { mdp: "123456789", nom: "Mariano Ramirez", grade: "RH" }
            };

            if (accounts[user] && accounts[user].mdp === pass) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainSite').classList.remove('hidden');
                document.getElementById('userName').innerText = accounts[user].nom;
                document.getElementById('userGrade').innerText = accounts[user].grade;
            } else {
                alert("Identifiants incorrects !");
            }
        }
    </script>
</body>
</html>
