<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dynasty 8 - Panel Officiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #d1d5db; font-family: 'Inter', sans-serif; }
        .gta-card { background: #0f1012; border: 1px solid #1c1e22; border-radius: 10px; }
        .input-gta { background: #16181b; border: 1px solid #282c31; color: white; padding: 12px; border-radius: 6px; width: 100%; outline: none; }
        .btn-blue { background: #2454d1; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginPage" class="flex items-center justify-center min-h-screen">
        <div class="gta-card p-10 w-full max-w-md shadow-2xl">
            <div class="text-center mb-8">
                <img src="https://i.imgur.com/4E7XyZq.png" class="w-20 mx-auto mb-4">
                <h2 class="text-2xl font-bold uppercase italic text-white">Dynasty <span class="text-blue-600">8</span></h2>
            </div>
            <div class="space-y-4">
                <input type="text" id="idInput" class="input-gta text-center" placeholder="IDENTIFIANT">
                <input type="password" id="passInput" class="input-gta text-center" placeholder="MOT DE PASSE">
                <button onclick="handleLogin()" class="w-full btn-blue text-white py-4 rounded uppercase tracking-widest">Se connecter</button>
            </div>
        </div>
    </div>

    <div id="mainSite" class="hidden p-4 md:p-8">
        <header class="flex justify-between items-center mb-8 gta-card p-4 border-l-4 border-blue-600">
            <div class="flex items-center gap-4">
                <img src="https://i.imgur.com/4E7XyZq.png" class="w-10">
                <div>
                    <h1 id="navName" class="font-bold text-white uppercase">---</h1>
                    <p id="navGrade" class="text-blue-500 text-[10px] font-black uppercase italic tracking-tighter">---</p>
                </div>
            </div>
            <div class="flex gap-4">
                <button id="adminBtn" onclick="toggleView('adminView')" class="hidden bg-yellow-600/20 text-yellow-500 border border-yellow-600/50 px-4 py-2 rounded text-xs font-bold uppercase">🛠️ Gestion</button>
                <button onclick="toggleView('saleView')" class="bg-blue-600/20 text-blue-500 border border-blue-600/50 px-4 py-2 rounded text-xs font-bold uppercase">🏠 Ventes</button>
                <button onclick="logout()" class="bg-red-900/20 text-red-500 border border-red-500/50 px-4 py-2 rounded text-[10px] font-bold uppercase">Déconnexion</button>
            </div>
        </header>

        <div id="saleView" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="gta-card p-6">
                <h3 class="text-blue-500 font-bold uppercase text-xs mb-4">Dossier Client</h3>
                <input type="text" class="input-gta mb-4" placeholder="Nom Prénom">
                <input type="text" class="input-gta" value="555-">
            </div>
            <div class="gta-card p-6 text-center">
                <h3 class="text-blue-500 font-bold uppercase text-xs mb-4">Validation</h3>
                <p class="text-gray-500 text-sm mb-4 italic">Remplissez les infos pour envoyer au Discord</p>
                <button class="w-full btn-blue text-white py-4 rounded uppercase">Enregistrer la vente</button>
            </div>
        </div>

        <div id="adminView" class="hidden gta-card p-6">
            <h2 class="text-yellow-500 font-bold uppercase mb-6 italic">Panel de Direction</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="adminId" class="input-gta" placeholder="ID">
                <input type="text" id="adminPass" class="input-gta" placeholder="MDP">
                <select id="adminGrade" class="input-gta">
                    <option>Patron</option><option>DRH</option><option>RH</option>
                    <option>Manager</option><option>Agent Expert</option><option>Agent</option>
                </select>
                <button onclick="createAccount()" class="bg-green-600 text-white font-bold rounded">Créer Accès</button>
            </div>
        </div>
    </div>

    <script>
        // --- LA LISTE DES COMPTES EST ICI ---
        let accounts = {
            "owner": { mdp: "admin123", nom: "Direction", grade: "Patron" },
            "Mariano Ramirez": { mdp: "123456789", nom: "Mariano Ramirez", grade: "RH" }
        };

        const saved = localStorage.getItem('d8_accounts');
        if (saved) { accounts = JSON.parse(saved); }

        window.onload = function() {
            const user = localStorage.getItem('d8_logged_user');
            if (user && accounts[user]) { startSite(accounts[user]); }
        };

        function handleLogin() {
            const u = document.getElementById('idInput').value;
            const p = document.getElementById('passInput').value;
            if (accounts[u] && accounts[u].mdp === p) {
                localStorage.setItem('d8_logged_user', u);
                startSite(accounts[u]);
            } else { alert("Identifiants incorrects"); }
        }

        function startSite(user) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainSite').classList.remove('hidden');
            document.getElementById('navName').innerText = user.nom;
            document.getElementById('navGrade').innerText = user.grade;
            
            if(["Patron", "DRH", "RH", "Manager"].includes(user.grade)) {
                document.getElementById('adminBtn').classList.remove('hidden');
            }
        }

        function createAccount() {
            const id = document.getElementById('adminId').value;
            const pass = document.getElementById('adminPass').value;
            const gr = document.getElementById('adminGrade').value;
            if(id && pass) {
                accounts[id] = { mdp: pass, nom: id, grade: gr };
                localStorage.setItem('d8_accounts', JSON.stringify(accounts));
                alert("Compte ajouté sur ce navigateur !");
                location.reload();
            }
        }

        function toggleView(v) {
            document.getElementById('saleView').classList.toggle('hidden', v !== 'saleView');
            document.getElementById('adminView').classList.toggle('hidden', v !== 'adminView');
        }

        function logout() {
            localStorage.removeItem('d8_logged_user');
            location.reload();
        }
    </script>
</body>
</html>
