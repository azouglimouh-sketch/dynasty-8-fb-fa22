<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dynasty 8 - Panel Officiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #d1d5db; font-family: 'Inter', sans-serif; }
        .gta-card { background: #0f1012; border: 1px solid #1c1e22; border-radius: 10px; }
        .input-gta { background: #16181b; border: 1px solid #282c31; color: white; padding: 10px; border-radius: 5px; width: 100%; }
        .btn-blue { background: #2454d1; transition: 0.3s; }
        .btn-blue:hover { background: #1a3fb3; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="loginPage" class="flex items-center justify-center min-h-screen">
        <div class="gta-card p-8 w-96 text-center">
            <img src="https://i.imgur.com/4E7XyZq.png" class="w-20 mx-auto mb-4">
            <h2 class="text-xl font-bold uppercase mb-6 text-white">Connexion Dynasty 8</h2>
            <input type="text" id="user" class="input-gta mb-4" placeholder="Identifiant">
            <input type="password" id="pass" class="input-gta mb-6" placeholder="Mot de passe">
            <button onclick="login()" class="w-full btn-blue text-white py-3 rounded uppercase font-bold">Entrer</button>
        </div>
    </div>

    <div id="mainSite" class="hidden p-6">
        <header class="flex justify-between items-center mb-6 gta-card p-4">
            <div class="flex items-center gap-4">
                <img src="https://i.imgur.com/4E7XyZq.png" class="w-10">
                <div>
                    <h1 id="userName" class="font-bold text-white uppercase">---</h1>
                    <p id="userGrade" class="text-blue-500 text-xs font-bold uppercase italic">---</p>
                </div>
            </div>
            <div class="flex gap-3">
                <button id="adminBtn" onclick="showSection('adminSection')" class="hidden bg-yellow-600/20 text-yellow-500 border border-yellow-600/50 px-4 py-2 rounded text-xs font-bold uppercase">🛠️ Gestion</button>
                <button onclick="showSection('formSection')" class="bg-blue-600/20 text-blue-500 border border-blue-600/50 px-4 py-2 rounded text-xs font-bold uppercase">🏠 Ventes</button>
                <button onclick="logout()" class="bg-red-900/20 text-red-500 border border-red-500/50 px-4 py-2 rounded text-xs font-bold uppercase italic text-[10px]">Déconnexion</button>
            </div>
        </header>

        <div id="formSection" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="gta-card p-6">
                <h3 class="text-white font-bold mb-4 uppercase flex items-center gap-2"><i class="fa-solid fa-user text-blue-500"></i> Informations Client</h3>
                <input type="text" class="input-gta mb-4" placeholder="Nom & Prénom">
                <input type="text" class="input-gta" placeholder="Numéro de téléphone (555-...)">
            </div>
            <div class="gta-card p-6">
                <h3 class="text-white font-bold mb-4 uppercase italic">Récapitulatif</h3>
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between border-b border-gray-800 pb-2"><span>Type</span><span class="text-white">-</span></div>
                    <div class="flex justify-between font-bold text-lg pt-2 text-white"><span>TOTAL</span><span class="text-blue-500">0 $</span></div>
                </div>
                <button class="w-full btn-blue text-white mt-6 py-3 rounded font-bold uppercase opacity-50 cursor-not-allowed">Prenez votre service pour enregistrer</button>
            </div>
        </div>

        <div id="adminSection" class="hidden gta-card p-6 border-yellow-600/30">
            <h2 class="text-yellow-500 font-bold uppercase mb-6 italic">Contrôle de l'Agence</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <input type="text" id="newId" class="input-gta" placeholder="Nouvel ID Agent">
                <select id="newGrade" class="input-gta">
                    <option value="Stagiaire">Stagiaire</option>
                    <option value="Agent Novice">Agent Novice</option>
                    <option value="Agent Expert">Agent Expert</option>
                    <option value="DRH">DRH</option>
                    <option value="Patron">Patron</option>
                </select>
                <button onclick="addAccount()" class="bg-green-600 text-white font-bold rounded uppercase">Créer le compte</button>
            </div>
            <div class="bg-black/30 p-4 rounded border border-gray-800">
                <p class="text-xs text-gray-500 uppercase font-bold mb-2">Agents en service (Simulé)</p>
                <div class="flex justify-between items-center bg-[#16181b] p-3 rounded mb-2">
                    <span class="text-white font-bold">Ryan Parks</span>
                    <span class="bg-blue-600 text-[10px] px-2 py-1 rounded">56/60 QUOTA</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // BASE DE DONNÉES LOCALE
        let accounts = {
            "owner": { mdp: "admin123", nom: "Direction", grade: "Patron" },
            "agent": { mdp: "d8pass", nom: "Hernando Da-silvia", grade: "Agent Novice" }
        };

        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(accounts[u] && accounts[u].mdp === p) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainSite').classList.remove('hidden');
                document.getElementById('userName').innerText = accounts[u].nom;
                document.getElementById('userGrade').innerText = accounts[u].grade;

                // Si c'est un gradé, on montre le bouton gestion
                const g = accounts[u].grade;
                if(g === "Patron" || g === "DRH" || g === "Manager") {
                    document.getElementById('adminBtn').classList.remove('hidden');
                }
            } else { alert("Accès refusé !"); }
        }

        function showSection(id) {
            document.getElementById('formSection').classList.add('hidden');
            document.getElementById('adminSection').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function addAccount() {
            const id = document.getElementById('newId').value;
            const grade = document.getElementById('newGrade').value;
            if(id) {
                accounts[id] = { mdp: "1234", nom: id, grade: grade };
                alert("Compte " + id + " créé (MDP par défaut: 1234)");
            }
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
